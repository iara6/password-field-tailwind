<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link rel="stylesheet" href="password-field.css"> -->
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <title>Password Field</title>
</head>
<body class="bg-font-clr-1 h-screen grid justify-center items-center text-font-clr-1 font-oswald bg-custom-radial">
  <div class="container bg-white py-8 px-12 rounded-lg shadow-[0_0_15px_rgba(217,159,255,0.5),_0_0_35px_rgba(217,159,255,0.6)] animate-glowing">
    <h2 class="mb-8 text-[1.3rem] text-clr-2">Enter your password</h2>
    <div class="user-information">
      <div class="user-avatar">
        <img src="img-1.jpg" alt="">
      </div>
      <div>
        <div class="account-type">
          Business Account
        </div>
        <div class="name">
          Athena Cline
        </div>
      </div>
    </div>
    <div class="password-container">
      <i class="fa-solid fa-lock"></i>
      <input id="input" type="password" placeholder="Enter your password">
      <div class="eye-container">
        <i class="eye-icon fa-regular fa-eye"></i>
        <i class="fa-regular fa-eye-slash"></i>
      </div>
    </div>
    <div class="buttons">
      <div class="switch-button-container">
        <div class="switch-button">
          <span class="switch"></span>
        </div>
        Stay signed in
      </div>
      <button class="continue">Continue</button>
    </div>
    <div class="reset">
      Reset password
    </div>
  </div>
  <script src="password-field.js"></script>
</body>
</html>
