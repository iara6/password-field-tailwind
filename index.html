<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link rel="stylesheet" href="password-field.css"> -->
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <title>Password Field</title>
</head>
<div class="bg-violet-500 text-white p-4">
  Tailwind test
</div>
<body class="h-screen grid justify-center items-center text-font-clr-1 font-oswald bg-custom-radial">
  <div class="container bg-white py-8 px-12 rounded-lg shadow-[0_0_15px_rgba(217,159,255,0.5),_0_0_35px_rgba(217,159,255,0.6)] animate-glowing">
    <h2 class="mb-8 text-[1.3rem] text-clr-2 font-bold">Enter your password</h2>
    <div class="user-information flex items-center mb-4">
      <div class="user-avatar mr-2">
        <img class="h-16 w-16 object-cover rounded-full" src="img-1.jpg">
      </div>
      <div>
        <div class="account-type text-xs font-semibold text-font-clr-2">
          Business Account
        </div>
        <div class="name font-bold">
          Athena Cline
        </div>
      </div>
    </div>
    <div class="password-container relative flex items-center mb-6">
      <i class="fa-solid fa-lock text-font-clr-2 absolute text-sm top-1/2 -translate-y-1/2 left-[0.8rem]"></i>
      <input id="input" class="rounded-md text-sm pt-2.5 pr-8 pb-2.5 pl-[2.1rem] border border-font-clr-2 focus:outline-2 focus:outline-clr" type="password" placeholder="Enter your password">
      <div class="eye-container absolute top-1/2 -translate-y-1/2 right-[0.5rem] z-[15]">
        <i class="eye-icon fa-regular fa-eye text-base cursor-pointer text-font-clr-2 w-[18px]" style="display:none;"></i>
        <i class="fa-regular fa-eye-slash text-base cursor-pointer text-font-clr-2 "></i>
      </div>
    </div>
    <div class="buttons flex justify-between items-center mb-8">
      <div class="switch-button-container flex items-center text-xs font-semibold">
        <div class="switch-button h-[1.6rem] w-[2.7rem] rounded-[1rem] mr-[5px] relative flex items-center cursor-pointer border border-font-clr-2 transition-all duration-200 ease-out">
          <span class="switch absolute z-10 left-0 h-[1.2rem] w-[1.2rem] bg-clr transition-all duration-200 ease-out rounded-full mx-[3.2px]"></span>
        </div>
        Stay signed in
      </div>
      <button class="continue text-xs font-semibold text-white rounded-md cursor-pointer transition-all duration-[350ms] ease-out bg-clr border-0 py-[0.6rem] px-[0.7rem] hover:shadow-[inset_0_0_0_2em_theme(colors.font-clr-2)]">Continue</button>
    </div>
    <div class="reset text-xs font-semibold cursor-pointer underline">
      Reset password
    </div>
  </div>
  <script src="password-field.js"></script>
</body>
</html>
